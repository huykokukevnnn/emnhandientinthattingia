    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f3eae1; /* Màu nền bảng bần ấm áp */
            background-image: radial-gradient(#d5c4b1 1px, transparent 1px);
            background-size: 24px 24px;
            user-select: none;
        }

        /* Giả lập hiệu ứng ghim giấy lên tường gỗ/bảng bần */
        .pinned-card {
            background-color: #ffffff;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
        }

        .pinned-card:hover {
            transform: scale(1.03) rotate(0deg) !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 10px 10px -5px rgba(0, 0, 0, 0.15);
        }

        /* Hiệu ứng lượn sóng giả lập văn bản mờ cho học sinh lớp 2 */
        .wavy-line {
            height: 8px;
            background-color: #e5e7eb;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .wavy-line::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: translateX(-100%);
            animation: loading-wave 1.5s infinite;
        }

        @keyframes loading-wave {
            100% { transform: translateX(100%); }
        }

        /* Nút trạng thái nảy mút bong bóng */
        .bouncy-btn {
            transition: transform 0.1s ease, background-color 0.2s ease;
        }
        .bouncy-btn:active {
            transform: scale(0.9);
        }
    
        /* Sticker & Drag Drop */
        .sticker-bank {
            background-image: linear-gradient(to right, #f8f9fa, #e9ecef);
        }
        .sticker {
            cursor: grab;
            touch-action: none; /* Required for polyfill */
            transition: transform 0.2s;
        }
        .sticker:active {
            cursor: grabbing;
        }
        .sticker:hover {
            transform: scale(1.1) rotate(-5deg);
        }
        .drop-zone {
            transition: outline 0.2s, background-color 0.2s;
        }
        .drop-zone.drag-over {
            outline: 4px dashed #f59e0b;
            background-color: #fef3c7;
        }
        .stamp-overlay {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 1.5rem;
            font-weight: 900;
            padding: 8px 16px;
            border-radius: 8px;
            border: 4px solid;
            transform: rotate(-15deg);
            z-index: 20;
            opacity: 0.9;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stamp-true {
            color: #10b981;
            border-color: #10b981;
            background-color: rgba(255, 255, 255, 0.9);
        }
        .stamp-false {
            color: #ef4444;
            border-color: #ef4444;
            background-color: rgba(255, 255, 255, 0.9);
        }

    </style>
</head>

    </main>

                <!-- Nhãn Tin Giả -->

                    {

                        summary: "Một lời khuyên chăm sóc mắt kỳ lạ đang được lan truyền nhanh chóng.",

                        summary: "Kỹ năng sống quan trọng mọi học sinh tiểu học đều phải nắm rõ.",
                        content: "Sở Giao thông hướng dẫn: Khi đi bộ qua đường ở nơi đông xe cộ, các bé bắt buộc phải đi đúng vào vạch kẻ trắng dành cho người đi bộ, quan sát kỹ và tốt nhất nên có người lớn dắt tay.",
                        isTrue: true,
                        imageUrl: "https://loremflickr.com/400/200/crosswalk",

            }
        ];

        // 2. Các biến quản lý trạng thái trò chơi
        let shuffledRounds = [];
        let currentRoundIndex = 0;
        let selectedAnswers = {}; // Lưu trữ dạng: { cardId: 'true'/'false'/null }

        // Hàm xáo trộn mảng bằng thuật toán Fisher-Yates (Đảm bảo không bao giờ lỗi JS)
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Khởi động trò chơi
        function initGame() {
            shuffledRounds = shuffleArray(database);
            // Xáo trộn cả thứ tự 3 thẻ bài bên trong mỗi màn chơi
            shuffledRounds.forEach(round => {
                round.cards = shuffleArray(round.cards);
            });
            currentRoundIndex = 0;
            selectedAnswers = {};
            loadRound(currentRoundIndex);
        }

        // Tải một màn chơi (Round) lên màn hình
        function loadRound(index) {
            // Cập nhật thông số hiển thị
            document.getElementById('current-round-text').innerText = index + 1;
            
            const roundData = shuffledRounds[index];
            document.getElementById('round-theme-title').innerText = roundData.theme;

            const container = document.getElementById('cards-container');
            container.innerHTML = ''; // Làm sạch vùng chứa bảng tin cũ

            // Tạo hiệu ứng góc nghiêng ngẫu nhiên nhẹ nhàng cho các thẻ giấy ghim
            const rotations = ['-rotate-1', 'rotate-1', '-rotate-2', 'rotate-2', 'rotate-0'];

            roundData.cards.forEach((card, i) => {
                const rotationClass = rotations[i % rotations.length];
                const currentAnswer = selectedAnswers[card.id] || null;

                // Giao diện Stamp khi đã kéo thả nhãn vào
                let stampHTML = '';
                if (currentAnswer === 'true') {
                    stampHTML = `<div class="stamp-overlay stamp-true">✅ TIN THẬT</div>`;
                } else if (currentAnswer === 'false') {
                    stampHTML = `<div class="stamp-overlay stamp-false">❌ TIN GIẢ</div>`;
                }

                // Vẽ cấu trúc thẻ bài báo làm Drop Zone
                const cardHTML = `
                    <div id="card-${card.id}" 
                         class="pinned-card drop-zone ${rotationClass} rounded-2xl flex flex-col justify-between items-stretch text-left relative bg-white border border-gray-200 overflow-hidden shadow-lg hover:shadow-xl transition-all h-full"
                         ondragover="allowDrop(event, this)" 
                         ondragleave="dragLeave(event, this)"
                         ondrop="dropSticker(event, ${card.id}, this)">
                        
                        <!-- Ghim bấm giả lập -->
                        <div class="absolute -top-3 left-1/2 -translate-x-1/2 text-2xl filter drop-shadow z-10">📌</div>

                        <!-- Header bài báo -->
                        <div class="px-4 pt-5 pb-2 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 pointer-events-none">
                            <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">${card.source}</span>
                            <span class="text-[10px] text-gray-400 font-medium">${card.time}</span>
                        </div>

                        <!-- Nội dung chính bài báo -->
                        <div class="px-4 py-3 flex-grow flex flex-col gap-2 pointer-events-none pb-8">
                            <h3 class="text-[#222222] text-base md:text-lg font-extrabold leading-snug line-clamp-3">
                                ${card.title}
                            </h3>
                            
                            <div class="w-full h-28 md:h-32 rounded-lg overflow-hidden bg-gray-100 shadow-sm border border-gray-100 relative my-1 shrink-0">
                                <img src="${card.imageUrl}" alt="Thumbnail" class="w-full h-full object-cover">
                            </div>

                            <p class="text-gray-700 text-xs md:text-sm font-semibold italic line-clamp-2 leading-snug">
                                ${card.summary}
                            </p>

                            <p class="text-gray-500 text-xs line-clamp-3 md:line-clamp-4 leading-relaxed text-justify">
                                ${card.content}
                            </p>
                        </div>

                        <!-- Hiển thị con dấu nếu đã dán nhãn -->
                        ${stampHTML}
                    </div>
                `;
                container.innerHTML += cardHTML;
            });

            checkFormValidity();
        }

        // CÁC HÀM XỬ LÝ KÉO THẢ (DRAG & DROP)
        window.dragStart = function(event, type) {
            event.dataTransfer.setData("stickerType", type);
            event.dataTransfer.effectAllowed = "copy";
        }

        window.allowDrop = function(event, element) {
            event.preventDefault(); // Phải có để cho phép thả
            event.dataTransfer.dropEffect = "copy";
            if (element) element.classList.add('drag-over');
        }

        window.dragLeave = function(event, element) {
            if (element) element.classList.remove('drag-over');
        }

        window.dropSticker = function(event, cardId, element) {
            event.preventDefault();
            if (element) element.classList.remove('drag-over');
            
            const stickerType = event.dataTransfer.getData("stickerType");
            if (stickerType) {
                selectedAnswers[cardId] = stickerType;
                loadRound(currentRoundIndex); // Cập nhật lại giao diện để hiển thị con dấu
            }
        }

        // Kiểm tra xem bé đã làm đủ 3 thẻ hay chưa để kích hoạt nút "Hoàn thành"
        function checkFormValidity() {
            const currentRoundCards = shuffledRounds[currentRoundIndex].cards;
            let answeredCount = 0;
            currentRoundCards.forEach(card => {
                if (selectedAnswers[card.id] !== undefined && selectedAnswers[card.id] !== null) {
                    answeredCount++;
                }
            });

            const submitBtn = document.getElementById('submit-btn');
            if (answeredCount === 3) {
                submitBtn.disabled = false;
                submitBtn.classList.remove('bg-gray-400', 'border-gray-600', 'cursor-not-allowed');
                submitBtn.classList.add('bg-orange-500', 'hover:bg-orange-600', 'border-orange-700', 'cursor-pointer');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.add('bg-gray-400', 'border-gray-600', 'cursor-not-allowed');
                submitBtn.classList.remove('bg-orange-500', 'hover:bg-orange-600', 'border-orange-700', 'cursor-pointer');
            }
        }

        // Xử lý sự kiện bấm nút Hoàn thành
        document.getElementById('submit-btn').addEventListener('click', () => {
            const currentRoundCards = shuffledRounds[currentRoundIndex].cards;
            let allCorrect = true;

            currentRoundCards.forEach(card => {
                const answer = selectedAnswers[card.id];
                const userSelectedTrue = (answer === 'true');
                if (userSelectedTrue !== card.isTrue) {
                    allCorrect = false;
                }
            });

            if (allCorrect) {
                // Nếu đúng hết -> Sang màn kế tiếp
                hideToast();
                triggerMiniConfetti();
                
                if (currentRoundIndex < 5) {
                    currentRoundIndex++;
                    setTimeout(() => {
                        loadRound(currentRoundIndex);
                    }, 800);
                } else {
                    // Đã thắng cả 6 màn chơi!
                    showVictoryCelebration();
                }
            } else {
                // Nếu sai bất kỳ câu nào -> Chỉ báo lỗi, giữ nguyên lựa chọn để bé tự sửa đổi
                showToast("Bạn đã phân biệt sai tin giả rồi, bé hãy tự kiểm tra lại nhé!");
            }
        });

        // Hiện thông báo lỗi tự động biến mất sau 4 giây
        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('status-toast');
            document.getElementById('toast-message').innerText = message;
            toast.classList.remove('opacity-0', 'translate-y-2', 'pointer-events-none');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                hideToast();
            }, 4000);
        }

        function hideToast() {
            const toast = document.getElementById('status-toast');
            toast.classList.add('opacity-0', 'translate-y-2', 'pointer-events-none');
        }

        // Bắn pháo hoa nhỏ khi qua được 1 màn
        function triggerMiniConfetti() {
            confetti({
                particleCount: 80,
                spread: 60,
                origin: { y: 0.8 }
            });
        }

        // Bắn pháo hoa bùng nổ khi thắng toàn bộ trò chơi
        function showVictoryCelebration() {
            const modal = document.getElementById('victory-modal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.remove('scale-90');

            const end = Date.now() + (4 * 1000);
            const colors = ['#bb0000', '#ffffff', '#22c55e', '#facc15'];

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // Nút chơi lại từ đầu
        document.getElementById('restart-btn').addEventListener('click', () => {
            const modal = document.getElementById('victory-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.add('scale-90');
            initGame();
        });

        // Khởi tạo chạy trò chơi ngay khi trang load xong
        window.addEventListener('DOMContentLoaded', () => {
            // Kích hoạt Polyfill để hỗ trợ kéo thả trên màn hình cảm ứng iPad/Điện thoại
            MobileDragDrop.polyfill({
                dragImageTranslateOverride: MobileDragDrop.scrollBehaviourDragImageTranslateOverride
            });
            window.addEventListener('touchmove', function() {}, {passive: false}); // Yêu cầu của polyfill trên Safari iOS
            
            initGame();
        });
    </script>
</body>
</html>
