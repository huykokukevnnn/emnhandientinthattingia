<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Em nhận diện tin thật, tin giả</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #F4EAE1;
            /* Subtle corkboard texture */
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.04"/></svg>');
        }
        
        @keyframes wave-flow {
            0% { transform: translateX(0); }
            100% { transform: translateX(-20px); }
        }
        .wavy-line {
            white-space: nowrap;
            letter-spacing: 2px;
            animation: wave-flow linear infinite;
        }

        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            display: none;
        }

        /* Toast animation */
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .toast-enter {
            animation: slideInUp 0.3s ease-out forwards;
        }
        .toast-exit {
            animation: fadeOut 0.3s ease-in forwards;
        }
    </style>
</head>
<body class="min-h-screen w-full flex flex-col items-center justify-between p-4 md:p-8 overflow-hidden select-none">

    <!-- Header -->
    <header class="w-full max-w-6xl flex justify-between items-center mb-6 relative z-10">
        <h1 class="text-2xl md:text-3xl font-extrabold text-amber-800 bg-white/70 backdrop-blur-md px-6 py-3 rounded-2xl shadow-sm border border-amber-900/10 flex items-center gap-3">
            <span class="text-4xl drop-shadow-sm">🕵️</span> 
            Em nhận diện tin thật, tin giả
        </h1>
        <div id="round-indicator" class="text-xl font-bold text-amber-800 bg-amber-300/90 px-6 py-3 rounded-2xl shadow-sm border border-amber-400">
            Vòng 1 / 6
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 w-full flex flex-col justify-center items-center relative z-10 max-w-6xl mx-auto">
        <h2 id="round-title" class="text-3xl md:text-4xl font-extrabold text-center text-gray-800 mb-10 drop-shadow-sm bg-white/40 px-8 py-2 rounded-full inline-block">
            Chủ đề: Động vật quanh ta
        </h2>
        
        <!-- Cards Container -->
        <div id="cards-container" class="flex flex-row justify-center items-center gap-6 lg:gap-10 w-full h-[28rem]">
            <!-- Cards will be injected here via JS -->
        </div>
    </main>

    <!-- Footer Action -->
    <footer class="w-full flex justify-center py-6 relative z-10">
        <button id="submit-btn" disabled onclick="submitRound()"
            class="bg-gray-400 text-white font-extrabold rounded-full py-4 px-12 text-2xl shadow-[0_8px_0_#9ca3af] opacity-50 cursor-not-allowed transition-all duration-200 focus:outline-none tracking-wide">
            Hoàn thành
        </button>
    </footer>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 pointer-events-none"></div>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-amber-900/40 backdrop-blur-sm z-50 hidden flex-col items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white p-10 rounded-3xl shadow-2xl flex flex-col items-center transform scale-90 transition-transform duration-300 border-4 border-emerald-400" id="success-modal-content">
            <div class="w-24 h-24 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center text-5xl mb-6 shadow-inner border-2 border-emerald-200">
                ⭐
            </div>
            <h3 class="text-4xl font-extrabold text-gray-800 mb-4">Chính xác!</h3>
            <p class="text-xl text-gray-600 text-center mb-8 font-bold">Bạn đã phân biệt rất tốt các tin tức.</p>
            <button onclick="nextRound()" class="bg-emerald-500 text-white font-extrabold rounded-full py-4 px-10 text-2xl shadow-[0_8px_0_#059669] hover:translate-y-1 hover:shadow-[0_4px_0_#059669] active:translate-y-2 active:shadow-none transition-all">
                Tiếp tục vòng sau
            </button>
        </div>
    </div>

    <!-- Win Screen -->
    <div id="win-screen" class="fixed inset-0 bg-white z-50 hidden flex-col items-center justify-center">
        <div class="text-center flex flex-col items-center z-10 relative">
            <div class="text-9xl mb-6 animate-bounce">🏆</div>
            <h1 class="text-6xl font-extrabold text-amber-500 mb-6 drop-shadow-md">Chiến thắng!</h1>
            <h2 class="text-4xl font-bold text-gray-800 mb-12 bg-amber-100 px-8 py-4 rounded-3xl">Bạn là Đại sứ chống tin giả xuất sắc!</h2>
            <button onclick="location.reload()" class="bg-blue-500 text-white font-extrabold rounded-full py-5 px-14 text-3xl shadow-[0_8px_0_#2563eb] hover:translate-y-1 hover:shadow-[0_4px_0_#2563eb] active:translate-y-2 active:shadow-none transition-all">
                Chơi lại từ đầu
            </button>
        </div>
        <!-- Decorative particles behind text -->
        <div class="absolute inset-0 opacity-40 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-amber-200 via-white to-white"></div>
    </div>

    <script>
        // Dataset
        const allRoundsData = [
            {
                title: "Động vật quanh ta",
                cards: [
                    { text: "Chim cánh cụt là loài chim nhưng không biết bay, chúng bơi và lặn rất giỏi dưới nước.", isTrue: true, image: "https://placehold.co/400x300/e0f7fa/006064?text=Penguin+Swimming" },
                    { text: "Thỏ chỉ có thể ăn cà rốt chứ không thể ăn được cỏ hay các loại rau xanh khác.", isTrue: false, image: "https://placehold.co/400x300/fbe9e7/bf360c?text=Rabbit+with+Carrot" },
                    { text: "Voi dùng chiếc vòi dài của mình để hút nước và cầm nắm thức ăn đưa vào miệng.", isTrue: true, image: "https://placehold.co/400x300/efebe9/4e342e?text=Elephant+Eating" }
                ]
            },
            {
                title: "Thiên nhiên & Thời tiết",
                cards: [
                    { text: "Cầu vồng sau cơn mưa thực chất chỉ có đúng 3 màu cơ bản là Đỏ, Vàng và Xanh lá cây.", isTrue: false, image: "https://placehold.co/400x300/fff9c4/f57f17?text=3-Colored+Rainbow" },
                    { text: "Sấm sét thường xuất hiện cùng lúc hoặc ngay trước khi trời có mưa dông lớn.", isTrue: true, image: "https://placehold.co/400x300/eceff1/263238?text=Lightning+Bolt" },
                    { text: "Khi trời mưa dông, nếu chúng ta mở một chiếc ô (dù) màu đỏ thì sét sẽ luôn đánh vào chiếc ô đó.", isTrue: false, image: "https://placehold.co/400x300/ffcdd2/b71c1c?text=Red+Umbrella" }
                ]
            },
            {
                title: "Thói quen & Sức khỏe",
                cards: [
                    { text: "Đánh răng ít nhất 2 lần mỗi ngày (sáng và tối) giúp bảo vệ răng không bị sâu.", isTrue: true, image: "https://placehold.co/400x300/e8eaf6/1a237e?text=Toothbrush+and+Paste" },
                    { text: "Nếu lỡ nuốt hạt dưa hấu vào bụng, hạt sẽ nảy mầm và mọc thành cây dưa hấu trong dạ dày.", isTrue: false, image: "https://placehold.co/400x300/f1f8e9/33691e?text=Watermelon+Sprout" },
                    { text: "Thức khuya xem điện thoại trong bóng tối sẽ làm mắt bị mỏi và dễ bị cận thị.", isTrue: true, image: "https://placehold.co/400x300/fff3e0/e65100?text=Phone+in+Dark" }
                ]
            },
            {
                title: "Cây cối & Hoa quả",
                cards: [
                    { text: "Cây xương rồng là loài cây đặc biệt, chúng hoàn toàn không cần một giọt nước nào vẫn sống được quanh năm.", isTrue: false, image: "https://placehold.co/400x300/dcedc8/33691e?text=Desert+Cactus" },
                    { text: "Quả chuối khi chín sẽ chuyển từ vỏ màu xanh sang màu vàng và có vị ngọt, thơm.", isTrue: true, image: "https://placehold.co/400x300/fff59d/f57f17?text=Ripe+Bananas" },
                    { text: "Tất cả các loại nấm mọc hoang trong rừng có màu sắc càng sặc sỡ thì ăn vào càng ngon và bổ dưỡng.", isTrue: false, image: "https://placehold.co/400x300/ff8a80/b71c1c?text=Neon+Mushrooms" }
                ]
            },
            {
                title: "Trái Đất & Vũ trụ",
                cards: [
                    { text: "Trái Đất của chúng ta có hình dáng giống như một quả cầu tròn rất lớn.", isTrue: true, image: "https://placehold.co/400x300/e3f2fd/0d47a1?text=Planet+Earth" },
                    { text: "Mặt Trăng chỉ xuất hiện vào ban đêm, chúng ta không bao giờ có thể nhìn thấy Mặt Trăng vào ban ngày.", isTrue: false, image: "https://placehold.co/400x300/bbdefb/0d47a1?text=Sun+and+Moon" },
                    { text: "Các ngôi sao thực tế trên bầu trời có hình dáng 5 cánh nhọn giống hệt như hình chúng ta hay vẽ.", isTrue: false, image: "https://placehold.co/400x300/fff9c4/f57f17?text=5-Point+Star" }
                ]
            },
            {
                title: "Cuộc sống & An toàn",
                cards: [
                    { text: "Giấy và sách vở học tập của chúng ta được sản xuất từ nguyên liệu chính là gỗ cây.", isTrue: true, image: "https://placehold.co/400x300/d7ccc8/4e342e?text=Notebooks+and+Tree" },
                    { text: "Ngồi xem tivi thật sát màn hình sẽ giúp mắt chúng ta nhìn rõ hơn và bảo vệ mắt không bị cận thị.", isTrue: false, image: "https://placehold.co/400x300/cfd8dc/263238?text=Close+to+TV" },
                    { text: "Khi đi bộ qua đường, chúng ta bắt buộc phải đi vào vạch kẻ trắng và có người lớn dắt tay.", isTrue: true, image: "https://placehold.co/400x300/f5f5f5/212121?text=Zebra+Crossing" }
                ]
            }
        ];

        let rounds = [];
        let currentRoundIndex = 0;
        let cardStates = [null, null, null];

        function initGame() {
            // Shuffle rounds completely
            rounds = [...allRoundsData].sort(() => Math.random() - 0.5);
            currentRoundIndex = 0;
            renderRound();
        }

        function renderRound() {
            const round = rounds[currentRoundIndex];
            cardStates = [null, null, null];
            
            document.getElementById('round-indicator').innerText = \`Vòng \${currentRoundIndex + 1} / \${rounds.length}\`;
            document.getElementById('round-title').innerText = \`Chủ đề: \${round.title}\`;
            
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            round.cards.forEach((card, index) => {
                const rotation = (Math.random() * 3 - 1.5).toFixed(1);
                
                const cardEl = document.createElement('div');
                cardEl.className = \`relative bg-white rounded-3xl shadow-xl p-5 lg:p-7 flex flex-col items-center transform transition-transform hover:scale-[1.02] duration-300 w-[31%] max-w-[22rem] min-w-[16rem] h-full border border-gray-100\`;
                cardEl.style.transform = \`rotate(\${rotation}deg)\`;
                
                cardEl.innerHTML = \`
                    <!-- Pushpin Button -->
                    <div id="pin-\${index}" class="absolute -top-7 left-1/2 -translate-x-1/2 w-14 h-14 rounded-full shadow-[0_4px_10px_rgba(0,0,0,0.15)] flex items-center justify-center text-3xl font-bold transition-all duration-300 border-[5px] border-gray-200 bg-white text-gray-400 cursor-pointer select-none" onclick="togglePin(\${index})">
                        ❓
                    </div>
                    
                    <!-- Content Title -->
                    <h3 class="text-[1.15rem] lg:text-[1.25rem] font-bold text-center mt-6 text-gray-800 h-28 flex items-center justify-center leading-snug">
                        \${card.text}
                    </h3>
                    
                    <!-- Image Placeholder -->
                    <div class="w-full h-36 lg:h-40 mt-3 rounded-2xl overflow-hidden shadow-inner border-2 border-gray-100 relative bg-gray-50 flex-shrink-0">
                        <img src="\${card.image}" class="w-full h-full object-cover" alt="Minh họa" />
                    </div>
                    
                    <!-- Fake Content Simulation -->
                    <div class="mt-5 w-full overflow-hidden text-gray-300 opacity-70">
                        <div class="wavy-line text-lg lg:text-xl font-bold" style="animation-duration: 2.2s; width: 100%;">~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~</div>
                        <div class="wavy-line text-lg lg:text-xl font-bold" style="animation-duration: 2.8s; width: 90%;">~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~</div>
                        <div class="wavy-line text-lg lg:text-xl font-bold" style="animation-duration: 3.5s; width: 80%;">~~~~~~~~~~~~~~~~~~~~~~~~~~~~~</div>
                    </div>
                \`;
                container.appendChild(cardEl);
            });
            
            updateSubmitButton();
        }

        function togglePin(index) {
            const states = [null, true, false];
            const currentStateIndex = states.indexOf(cardStates[index]);
            const nextState = states[(currentStateIndex + 1) % 3];
            cardStates[index] = nextState;
            
            const pin = document.getElementById(\`pin-\${index}\`);
            
            // Reset base classes
            pin.className = "absolute -top-7 left-1/2 -translate-x-1/2 h-14 rounded-full shadow-[0_4px_10px_rgba(0,0,0,0.15)] flex items-center justify-center font-extrabold transition-all duration-300 border-[5px] cursor-pointer select-none tracking-wide";
            
            if (nextState === null) {
                pin.classList.add('w-14', 'bg-white', 'border-gray-200', 'text-gray-400', 'text-3xl');
                pin.innerHTML = '❓';
            } else if (nextState === true) {
                pin.classList.add('w-32', 'bg-emerald-500', 'border-emerald-600', 'text-white', 'text-xl', 'shadow-emerald-500/40');
                pin.innerHTML = '✅ Thật';
            } else {
                pin.classList.add('w-32', 'bg-rose-500', 'border-rose-600', 'text-white', 'text-xl', 'shadow-rose-500/40');
                pin.innerHTML = '❌ Giả';
            }
            
            updateSubmitButton();
        }

        function updateSubmitButton() {
            const btn = document.getElementById('submit-btn');
            const isComplete = cardStates.every(state => state !== null);
            
            if (isComplete) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-gray-400', 'shadow-[0_8px_0_#9ca3af]');
                btn.classList.add('bg-blue-500', 'shadow-[0_8px_0_#2563eb]', 'hover:translate-y-1', 'hover:shadow-[0_4px_0_#2563eb]', 'active:translate-y-2', 'active:shadow-none');
                btn.disabled = false;
            } else {
                btn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-gray-400', 'shadow-[0_8px_0_#9ca3af]');
                btn.classList.remove('bg-blue-500', 'shadow-[0_8px_0_#2563eb]', 'hover:translate-y-1', 'hover:shadow-[0_4px_0_#2563eb]', 'active:translate-y-2', 'active:shadow-none');
                btn.disabled = true;
            }
        }

        function submitRound() {
            const round = rounds[currentRoundIndex];
            const isCorrect = cardStates.every((state, idx) => state === round.cards[idx].isTrue);
            
            if (isCorrect) {
                if (currentRoundIndex === rounds.length - 1) {
                    showWinScreen();
                } else {
                    showSuccessModal();
                }
            } else {
                showErrorToast("Bạn đã phân biệt sai tin giả");
            }
        }

        function showSuccessModal() {
            const modal = document.getElementById('success-modal');
            const content = document.getElementById('success-modal-content');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-90');
                content.classList.add('scale-100');
            }, 10);
        }

        function hideSuccessModal() {
            const modal = document.getElementById('success-modal');
            const content = document.getElementById('success-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-90');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        function nextRound() {
            hideSuccessModal();
            currentRoundIndex++;
            renderRound();
        }

        function showWinScreen() {
            const screen = document.getElementById('win-screen');
            screen.classList.remove('hidden');
            screen.classList.add('flex');
            
            var duration = 4 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 6,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#2563eb', '#10b981', '#f59e0b', '#f43f5e', '#8b5cf6']
                });
                confetti({
                    particleCount: 6,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#2563eb', '#10b981', '#f59e0b', '#f43f5e', '#8b5cf6']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function showErrorToast(message) {
            const container = document.getElementById('toast-container');
            
            const toast = document.createElement('div');
            toast.className = 'bg-rose-500 text-white font-bold py-4 px-10 rounded-full shadow-[0_10px_25px_rgba(225,29,72,0.4)] text-xl flex items-center gap-4 toast-enter mb-4 border-4 border-white';
            toast.innerHTML = \`<span class="text-3xl">⚠️</span> \${message}\`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }

        // Init game on load
        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
